<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siege Breaker — Kenneth D'Silva</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0610;
        overflow: hidden;
        font-family: monospace;
      }
      #portfolio-link {
        position: fixed;
        top: 24px;
        left: 24px;
        z-index: 100;
        color: #ffaa44;
        text-decoration: none;
        font-family: monospace;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.7);
        padding: 6px 12px;
        border: 1px solid #ffaa4433;
        border-radius: 4px;
        transition: background 0.2s;
      }
      #portfolio-link:hover {
        background: rgba(255, 170, 68, 0.1);
      }
      #hud {
        position: fixed;
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        display: flex;
        gap: 24px;
        align-items: center;
        background: rgba(0, 0, 0, 0.7);
        padding: 8px 22px;
        border-radius: 8px;
        border: 1px solid #ffaa4433;
        color: #ffaa44;
        font-size: 14px;
        white-space: nowrap;
      }
      #hud span {
        color: #fff;
      }
      #hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        color: #886644;
        font-size: 12px;
        font-family: monospace;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 14px;
        border-radius: 4px;
      }
      #overlay {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(5, 2, 10, 0.92);
        color: #fff;
        font-family: monospace;
      }
      #overlay h1 {
        font-size: 52px;
        color: #ffaa44;
        text-shadow: 0 0 20px #ff6600;
        margin-bottom: 16px;
      }
      #overlay p {
        font-size: 15px;
        color: #aaa;
        margin-bottom: 6px;
        max-width: 500px;
        text-align: center;
      }
      #overlay button {
        margin-top: 28px;
        padding: 12px 32px;
        font-size: 18px;
        font-family: monospace;
        background: #1a0800;
        color: #ffaa44;
        border: 2px solid #ffaa44;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s;
      }
      #overlay button:hover {
        background: #2a1000;
      }
      #round-banner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 60;
        font-size: 42px;
        color: #ffaa44;
        font-family: monospace;
        text-shadow: 0 0 24px #ff6600;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        background: rgba(0, 0, 0, 0.7);
        padding: 16px 40px;
        border-radius: 8px;
        border: 2px solid #ffaa4466;
      }
    </style>
  </head>
  <body>
    <a href="index.html" id="portfolio-link">← Portfolio</a>
    <div id="hud">
      ROUND <span id="hud-round">1</span>/3 &nbsp;|&nbsp; SHOTS
      <span id="hud-shots">5</span> &nbsp;|&nbsp; DESTROYED
      <span id="hud-score">0%</span> &nbsp;|&nbsp; TOTAL
      <span id="hud-total">0%</span>
    </div>
    <div id="hint">
      Drag to aim · Release to fire · Orbit camera with right-click / two-finger
      drag
    </div>
    <div id="round-banner" id="round-banner"></div>
    <div id="overlay">
      <h1>SIEGE BREAKER</h1>
      <p>
        Drag to aim your catapult and release to fire. Topple the castle towers!
      </p>
      <p style="color: #ff8822">
        3 rounds · 5 shots each · Maximum destruction wins
      </p>
      <button id="start-btn">LAUNCH ASSAULT</button>
    </div>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/ammo.js"></script>
    <script>
      (async function () {
        // --- Babylon setup ---
        const canvas = document.createElement("canvas");
        canvas.style.position = "fixed";
        canvas.style.inset = "0";
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        document.body.insertBefore(canvas, document.getElementById("overlay"));

        const engine = new BABYLON.Engine(canvas, true, {
          preserveDrawingBuffer: true,
          stencil: true,
        });
        const scene = new BABYLON.Scene(engine);

        // --- Ammo physics ---
        const ammoInstance = await Ammo();
        const gravityVec = new BABYLON.Vector3(0, -9.81, 0);
        scene.enablePhysics(
          gravityVec,
          new BABYLON.AmmoJSPlugin(true, ammoInstance),
        );

        // --- Skybox / background color ---
        scene.clearColor = new BABYLON.Color4(0.08, 0.04, 0.12, 1);

        // --- Camera ---
        const camera = new BABYLON.ArcRotateCamera(
          "cam",
          -Math.PI / 2.5,
          Math.PI / 3.5,
          45,
          new BABYLON.Vector3(20, 0, 0),
          scene,
        );
        camera.lowerRadiusLimit = 15;
        camera.upperRadiusLimit = 80;
        camera.attachControl(canvas, true);
        camera.lowerBetaLimit = 0.2;
        camera.upperBetaLimit = Math.PI / 2.2;

        // --- Lighting ---
        const hemiLight = new BABYLON.HemisphericLight(
          "hemi",
          new BABYLON.Vector3(0, 1, 0),
          scene,
        );
        hemiLight.intensity = 0.5;
        hemiLight.groundColor = new BABYLON.Color3(0.3, 0.1, 0.05);
        hemiLight.diffuse = new BABYLON.Color3(0.9, 0.7, 0.5);

        const sunLight = new BABYLON.DirectionalLight(
          "sun",
          new BABYLON.Vector3(-1, -2, -1).normalize(),
          scene,
        );
        sunLight.position = new BABYLON.Vector3(10, 30, 10);
        sunLight.intensity = 1.2;
        sunLight.diffuse = new BABYLON.Color3(1, 0.85, 0.6);

        const shadowGen = new BABYLON.ShadowGenerator(2048, sunLight);
        shadowGen.useBlurExponentialShadowMap = true;

        // --- Ground ---
        const ground = BABYLON.MeshBuilder.CreateGround(
          "ground",
          { width: 150, height: 150 },
          scene,
        );
        const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
        groundMat.diffuseColor = new BABYLON.Color3(0.25, 0.18, 0.12);
        groundMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
        ground.material = groundMat;
        ground.receiveShadows = true;
        ground.physicsImpostor = new BABYLON.PhysicsImpostor(
          ground,
          BABYLON.PhysicsImpostor.BoxImpostor,
          { mass: 0, restitution: 0.3, friction: 0.9 },
          scene,
        );

        // --- Distant mountains (box silhouettes) ---
        const mountainPositions = [
          [-60, 0, -50],
          [60, 0, -50],
          [0, 0, -70],
          [-80, 0, -30],
          [80, 0, -30],
        ];
        const mountainHeights = [12, 10, 16, 8, 9];
        mountainPositions.forEach((pos, i) => {
          const m = BABYLON.MeshBuilder.CreateBox(
            "mtn" + i,
            { width: 20 + i * 5, height: mountainHeights[i], depth: 15 },
            scene,
          );
          m.position.set(pos[0], mountainHeights[i] / 2 - 0.5, pos[2]);
          const mm = new BABYLON.StandardMaterial("mtnMat" + i, scene);
          mm.diffuseColor = new BABYLON.Color3(0.08 + i * 0.01, 0.05, 0.08);
          mm.specularColor = BABYLON.Color3.Black();
          m.material = mm;
        });

        // Horizon gradient sky plane
        const skyPlane = BABYLON.MeshBuilder.CreatePlane(
          "sky",
          { width: 200, height: 60 },
          scene,
        );
        skyPlane.position.set(0, 20, -90);
        skyPlane.billboardMode = 0;
        const skyMat = new BABYLON.StandardMaterial("skyMat", scene);
        skyMat.diffuseColor = new BABYLON.Color3(0.9, 0.45, 0.12);
        skyMat.emissiveColor = new BABYLON.Color3(0.6, 0.2, 0.05);
        skyMat.backFaceCulling = false;
        skyPlane.material = skyMat;

        // --- Stone material ---
        function makeStoneMat(name, shade) {
          const mat = new BABYLON.StandardMaterial(name, scene);
          mat.diffuseColor = new BABYLON.Color3(
            shade,
            shade * 0.9,
            shade * 0.85,
          );
          mat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
          mat.specularPower = 32;
          return mat;
        }

        // --- Game state ---
        let round = 1;
        let shotsLeft = 5;
        let bricks = [];
        let totalBricks = 0;
        let projectiles = [];
        let roundScores = [];
        let gameStarted = false;
        let isDragging = false;
        let dragStartX = 0,
          dragStartY = 0;
        let dragCurrentX = 0,
          dragCurrentY = 0;
        let trajDots = [];
        let fireMuzzleLight = null;
        let fireMuzzleParticles = null;

        const LAUNCH_POS = new BABYLON.Vector3(-5, 1.5, 0);
        const MAX_POWER = 32;
        const MIN_POWER = 8;

        // --- Tower configurations per round ---
        function getTowerConfig(r) {
          const configs = [
            [
              { cx: 22, cz: -3, bricks: 10 },
              { cx: 28, cz: 0, bricks: 12 },
              { cx: 22, cz: 3, bricks: 8 },
            ],
            [
              { cx: 24, cz: -4, bricks: 11 },
              { cx: 30, cz: 0, bricks: 10 },
              { cx: 24, cz: 4, bricks: 9 },
            ],
            [
              { cx: 25, cz: -5, bricks: 12 },
              { cx: 32, cz: 0, bricks: 12 },
              { cx: 25, cz: 5, bricks: 10 },
            ],
          ];
          return configs[r - 1];
        }

        // --- Build towers ---
        function buildTowers(r) {
          bricks.forEach((b) => {
            if (b.impostor) b.impostor.dispose();
            b.dispose();
          });
          bricks = [];

          const config = getTowerConfig(r);
          config.forEach((tower, ti) => {
            const shade = 0.45 + ti * 0.07;
            const stoneMat = makeStoneMat("stone_" + r + "_" + ti, shade);

            for (let i = 0; i < tower.bricks; i++) {
              const row = Math.floor(i / 2);
              const col = i % 2;
              const bx = tower.cx + (col - 0.5) * 0.6;
              const by = 0.25 + row * 0.55;
              const bz = tower.cz + (Math.random() - 0.5) * 0.05;

              const brick = BABYLON.MeshBuilder.CreateBox(
                "brick_" + r + "_" + ti + "_" + i,
                { width: 1, height: 0.5, depth: 0.5 },
                scene,
              );
              brick.position.set(bx, by, bz);
              brick.material = stoneMat;
              brick.receiveShadows = true;
              brick.castShadow = true;
              shadowGen.addShadowCaster(brick);
              brick.physicsImpostor = new BABYLON.PhysicsImpostor(
                brick,
                BABYLON.PhysicsImpostor.BoxImpostor,
                { mass: 2, restitution: 0.2, friction: 0.8 },
                scene,
              );
              bricks.push(brick);
            }
          });
          totalBricks = bricks.length;
          updateHUD();
        }

        // --- Trajectory preview ---
        function updateTrajectoryDots(startPos, velocity) {
          // Remove old dots
          trajDots.forEach((d) => d.dispose());
          trajDots = [];

          const g = 9.81;
          const dt = 0.1;
          for (let i = 1; i <= 20; i++) {
            const t = i * dt;
            const x = startPos.x + velocity.x * t;
            const y = startPos.y + velocity.y * t - 0.5 * g * t * t;
            const z = startPos.z + velocity.z * t;
            if (y < -2) break;

            const dot = BABYLON.MeshBuilder.CreateSphere(
              "dot_" + i,
              { diameter: 0.2 },
              scene,
            );
            dot.position.set(x, y, z);
            const dotMat = new BABYLON.StandardMaterial("dotMat_" + i, scene);
            const alpha = 1 - i / 22;
            dotMat.diffuseColor = new BABYLON.Color3(1, 0.6 * alpha, 0);
            dotMat.emissiveColor = new BABYLON.Color3(
              0.8 * alpha,
              0.3 * alpha,
              0,
            );
            dotMat.alpha = alpha;
            dot.material = dotMat;
            trajDots.push(dot);
          }
        }

        function clearTrajectory() {
          trajDots.forEach((d) => d.dispose());
          trajDots = [];
        }

        // --- Compute launch velocity from drag ---
        function computeVelocity(dxScreen, dyScreen) {
          const sensitivity = 0.18;
          const rawPower = Math.min(
            Math.sqrt(dxScreen * dxScreen + dyScreen * dyScreen) * sensitivity,
            MAX_POWER,
          );
          const power = Math.max(MIN_POWER, rawPower);

          // Horizontal angle from drag direction
          const angleH = Math.atan2(-dxScreen, dyScreen) + Math.PI * 0.85;
          const angleV =
            Math.PI / 5 + Math.min((rawPower / MAX_POWER) * 0.4, 0.4);

          return new BABYLON.Vector3(
            Math.cos(angleH) * Math.cos(angleV) * power,
            Math.sin(angleV) * power,
            Math.sin(angleH) * Math.cos(angleV) * power * 0.4,
          );
        }

        // --- Fire projectile ---
        function fire(velocity) {
          if (shotsLeft <= 0) return;
          shotsLeft--;

          // Remove oldest projectile if too many
          if (projectiles.length >= 5) {
            const oldest = projectiles.shift();
            if (oldest.impostor) oldest.impostor.dispose();
            oldest.dispose();
          }

          const proj = BABYLON.MeshBuilder.CreateSphere(
            "proj",
            { diameter: 0.8 },
            scene,
          );
          proj.position = LAUNCH_POS.clone();
          const projMat = new BABYLON.StandardMaterial("projMat", scene);
          projMat.diffuseColor = new BABYLON.Color3(0.4, 0.35, 0.3);
          projMat.specularColor = new BABYLON.Color3(0.2, 0.2, 0.2);
          proj.material = projMat;
          proj.receiveShadows = true;
          shadowGen.addShadowCaster(proj);
          proj.physicsImpostor = new BABYLON.PhysicsImpostor(
            proj,
            BABYLON.PhysicsImpostor.SphereImpostor,
            { mass: 15, restitution: 0.4, friction: 0.5 },
            scene,
          );
          proj.physicsImpostor.setLinearVelocity(velocity);
          projectiles.push(proj);

          // Muzzle fire effect
          if (fireMuzzleLight) fireMuzzleLight.dispose();
          fireMuzzleLight = new BABYLON.PointLight(
            "muzzle",
            LAUNCH_POS.clone(),
            scene,
          );
          fireMuzzleLight.diffuse = new BABYLON.Color3(1, 0.5, 0.1);
          fireMuzzleLight.intensity = 15;
          fireMuzzleLight.range = 8;

          // Particle burst at launch
          if (fireMuzzleParticles) fireMuzzleParticles.dispose();
          const ps = new BABYLON.ParticleSystem("fire", 50, scene);
          ps.emitter = LAUNCH_POS.clone();
          ps.minEmitBox = new BABYLON.Vector3(-0.2, -0.2, -0.2);
          ps.maxEmitBox = new BABYLON.Vector3(0.2, 0.2, 0.2);
          ps.color1 = new BABYLON.Color4(1, 0.7, 0.1, 1);
          ps.color2 = new BABYLON.Color4(1, 0.2, 0.0, 0.5);
          ps.colorDead = new BABYLON.Color4(0.2, 0.1, 0.0, 0);
          ps.minSize = 0.15;
          ps.maxSize = 0.5;
          ps.minLifeTime = 0.2;
          ps.maxLifeTime = 0.6;
          ps.emitRate = 80;
          ps.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
          ps.gravity = new BABYLON.Vector3(0, 4, 0);
          ps.direction1 = new BABYLON.Vector3(-1, 2, -1);
          ps.direction2 = new BABYLON.Vector3(1, 4, 1);
          ps.minEmitPower = 3;
          ps.maxEmitPower = 8;
          ps.updateSpeed = 0.01;
          ps.start();
          fireMuzzleParticles = ps;

          // Fade muzzle light
          let muzzleT = 0;
          const muzzleFade = scene.onBeforeRenderObservable.add(() => {
            muzzleT += 0.05;
            if (fireMuzzleLight)
              fireMuzzleLight.intensity = Math.max(0, 15 - muzzleT * 30);
            if (muzzleT > 0.5) {
              if (fireMuzzleLight) {
                fireMuzzleLight.dispose();
                fireMuzzleLight = null;
              }
              scene.onBeforeRenderObservable.remove(muzzleFade);
            }
          });

          // Stop particles after burst
          setTimeout(() => {
            if (ps && !ps.isDisposed()) ps.stop();
          }, 300);
          setTimeout(() => {
            if (ps && !ps.isDisposed()) ps.dispose();
          }, 1500);

          updateHUD();

          if (shotsLeft <= 0) {
            setTimeout(endRound, 3500);
          }
        }

        // --- Count destroyed bricks ---
        function getDestroyedCount() {
          let count = 0;
          bricks.forEach((b) => {
            if (b.position.y < -0.5) count++;
          });
          return count;
        }

        // --- HUD update ---
        function updateHUD() {
          document.getElementById("hud-round").textContent = round;
          document.getElementById("hud-shots").textContent = shotsLeft;
          const destroyed = getDestroyedCount();
          const pct =
            totalBricks > 0 ? Math.round((destroyed / totalBricks) * 100) : 0;
          document.getElementById("hud-score").textContent = pct + "%";
          const totalDestroyed = roundScores.reduce((a, b) => a + b, 0);
          const totalRoundBricks =
            roundScores.length > 0 ? totalBricks * round : totalBricks;
          document.getElementById("hud-total").textContent =
            roundScores.length > 0
              ? Math.round(
                  roundScores.reduce((a, b) => a + b, 0) / roundScores.length,
                ) + "%"
              : pct + "%";
        }

        // --- End round ---
        function endRound() {
          const destroyed = getDestroyedCount();
          const pct =
            totalBricks > 0 ? Math.round((destroyed / totalBricks) * 100) : 0;
          roundScores.push(pct);
          clearTrajectory();

          // Show round score
          const banner = document.getElementById("round-banner");

          if (round >= 3) {
            // Game over
            const avg = Math.round(
              roundScores.reduce((a, b) => a + b, 0) / roundScores.length,
            );
            showFinalScreen(avg);
          } else {
            banner.textContent = `ROUND ${round} — ${pct}% DESTROYED`;
            banner.style.opacity = "1";
            setTimeout(() => {
              banner.style.opacity = "0";
              round++;
              shotsLeft = 5;
              projectiles.forEach((p) => {
                if (p.impostor) p.impostor.dispose();
                p.dispose();
              });
              projectiles = [];
              buildTowers(round);
              updateHUD();
            }, 2500);
          }
        }

        function showFinalScreen(avg) {
          let grade =
            avg >= 80
              ? "SIEGE MASTER"
              : avg >= 50
                ? "SKILLED ARCHER"
                : "APPRENTICE CATAPULTEER";
          const ov = document.getElementById("overlay");
          ov.innerHTML = `
      <h1>SIEGE COMPLETE!</h1>
      <p style="font-size:28px;color:#ffaa44;margin-bottom:8px;">Total Destruction: <b>${avg}%</b></p>
      <p>${grade}</p>
      ${roundScores.map((s, i) => `<p style="color:#aaa;font-size:13px;">Round ${i + 1}: ${s}% destroyed</p>`).join("")}
      <button id="ov-btn">PLAY AGAIN</button>
    `;
          ov.style.display = "flex";
          document.getElementById("ov-btn").addEventListener("click", () => {
            ov.style.display = "none";
            round = 1;
            shotsLeft = 5;
            roundScores = [];
            projectiles.forEach((p) => {
              if (p.impostor) p.impostor.dispose();
              p.dispose();
            });
            projectiles = [];
            buildTowers(round);
            updateHUD();
          });
        }

        // --- Input: drag to aim ---
        canvas.addEventListener("pointerdown", (e) => {
          if (!gameStarted) return;
          if (e.button === 0) {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            dragCurrentX = e.clientX;
            dragCurrentY = e.clientY;
          }
        });

        canvas.addEventListener("pointermove", (e) => {
          if (!isDragging || !gameStarted) return;
          dragCurrentX = e.clientX;
          dragCurrentY = e.clientY;
          const dx = dragCurrentX - dragStartX;
          const dy = dragCurrentY - dragStartY;
          const vel = computeVelocity(dx, dy);
          updateTrajectoryDots(LAUNCH_POS, vel);
        });

        canvas.addEventListener("pointerup", (e) => {
          if (!isDragging || !gameStarted) return;
          if (e.button === 0) {
            isDragging = false;
            const dx = dragCurrentX - dragStartX;
            const dy = dragCurrentY - dragStartY;
            const dragDist = Math.sqrt(dx * dx + dy * dy);
            if (dragDist > 10 && shotsLeft > 0) {
              clearTrajectory();
              const vel = computeVelocity(dx, dy);
              fire(vel);
            } else {
              clearTrajectory();
            }
          }
        });

        // Touch
        canvas.addEventListener(
          "touchstart",
          (e) => {
            if (!gameStarted) return;
            isDragging = true;
            dragStartX = e.touches[0].clientX;
            dragStartY = e.touches[0].clientY;
            dragCurrentX = dragStartX;
            dragCurrentY = dragStartY;
            e.preventDefault();
          },
          { passive: false },
        );
        canvas.addEventListener(
          "touchmove",
          (e) => {
            if (!isDragging) return;
            dragCurrentX = e.touches[0].clientX;
            dragCurrentY = e.touches[0].clientY;
            const dx = dragCurrentX - dragStartX;
            const dy = dragCurrentY - dragStartY;
            const vel = computeVelocity(dx, dy);
            updateTrajectoryDots(LAUNCH_POS, vel);
            e.preventDefault();
          },
          { passive: false },
        );
        canvas.addEventListener("touchend", () => {
          if (!isDragging) return;
          isDragging = false;
          const dx = dragCurrentX - dragStartX;
          const dy = dragCurrentY - dragStartY;
          const dragDist = Math.sqrt(dx * dx + dy * dy);
          if (dragDist > 10 && shotsLeft > 0) {
            clearTrajectory();
            const vel = computeVelocity(dx, dy);
            fire(vel);
          } else {
            clearTrajectory();
          }
        });

        // --- Catapult visual (arm + base) ---
        function buildCatapult() {
          const base = BABYLON.MeshBuilder.CreateBox(
            "cat_base",
            { width: 2, height: 0.4, depth: 1.2 },
            scene,
          );
          base.position.set(-5, 0.2, 0);
          const woodMat = new BABYLON.StandardMaterial("wood", scene);
          woodMat.diffuseColor = new BABYLON.Color3(0.4, 0.25, 0.1);
          woodMat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
          base.material = woodMat;
          shadowGen.addShadowCaster(base);

          const arm = BABYLON.MeshBuilder.CreateBox(
            "cat_arm",
            { width: 0.2, height: 2.5, depth: 0.2 },
            scene,
          );
          arm.position.set(-5, 1.65, 0);
          arm.material = woodMat;
          shadowGen.addShadowCaster(arm);

          const sling = BABYLON.MeshBuilder.CreateSphere(
            "cat_sling",
            { diameter: 0.3 },
            scene,
          );
          sling.position.set(-5, 2.8, 0);
          const slingMat = new BABYLON.StandardMaterial("sling", scene);
          slingMat.diffuseColor = new BABYLON.Color3(0.6, 0.5, 0.3);
          slingMat.emissiveColor = new BABYLON.Color3(0.3, 0.2, 0.1);
          sling.material = slingMat;
        }

        // --- Periodic HUD update for destroyed count ---
        scene.onBeforeRenderObservable.add(() => {
          if (gameStarted) updateHUD();
        });

        // --- Render loop ---
        engine.runRenderLoop(() => {
          scene.render();
        });
        window.addEventListener("resize", () => {
          engine.resize();
        });

        // --- Start button ---
        document.getElementById("start-btn").addEventListener("click", () => {
          document.getElementById("overlay").style.display = "none";
          buildCatapult();
          buildTowers(round);
          gameStarted = true;
          updateHUD();
        });
      })();
    </script>
  </body>
</html>
